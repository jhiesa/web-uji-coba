<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Violations</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .snapshot-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .snapshot-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.12);
        }
        .snapshot-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s ease;
            border-bottom: 1px solid #1e293b;
        }
        .snapshot-card img:hover {
            opacity: 0.9;
        }
        .snapshot-card p {
            padding: 12px;
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            word-break: break-all;
            margin: 0;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            padding-top: 80px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 75vh;
            border-radius: 16px;
            border: 2px solid #1e293b;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: zoom 0.25s ease-out;
        }
        @keyframes zoom {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .close {
            position: absolute;
            top: 30px;
            right: 35px;
            color: #94a3b8;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }
        .close:hover {
            color: #ef4444;
        }
        #caption {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            text-align: center;
            color: #cbd5e1;
            padding: 20px 0;
            font-size: 15px;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <div class="logo">
        PPE-CAM
    </div>

    <div class="menu">

        <a href="/" class="menu-link">
    <div class="menu-item">
        Dashboard
    </div>
    </a>

    <a href="/monitoring" class="menu-link">
        <div class="menu-item">
            Monitoring
        </div>
    </a>

    <a href="/violations" class="menu-link">
        <div class="menu-item active">
            Violations
        </div>
    </a>

    <a href="/reports" class="menu-link">
        <div class="menu-item">
            Reports
        </div>
    </a>

    </div>

</div>

<div class="main">

    <div class="topbar">
        <h1>Violation Snapshots</h1>
    </div>

    <div class="gallery">

        {% for file in files %}

        <div class="snapshot-card">

            <img src="{{ url_for('static', filename='../snapshots/' + file) }}" 
                 onclick="openModal(this.src, '{{ file }}')" 
                 alt="{{ file }}">

            <p>{{ file }}</p>

        </div>

        {% endfor %}

    </div>

</div>

<!-- Modal Preview -->
<div id="image-modal" class="modal" onclick="closeModal()">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modal-img">
    <div id="caption"></div>
</div>

<script>
    function openModal(imgSrc, title) {
        document.getElementById("image-modal").style.display = "block";
        document.getElementById("modal-img").src = imgSrc;
        document.getElementById("caption").innerText = title;
    }
    function closeModal() {
        document.getElementById("image-modal").style.display = "none";
    }
    
    // Close modal on Escape key press
    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            closeModal();
        }
    });
</script>

</body>
</html>
